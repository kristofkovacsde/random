<template id="__bundler_thumbnail" data-bg-color="#16171A">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <!-- Stacked flashcards icon, DB-red accent -->
    <g transform="translate(600 400)">
      <!-- back card -->
      <rect x="-260" y="-150" width="520" height="320" rx="28" ry="28"
            fill="#2A2D33" stroke="#3D4148" stroke-width="2" transform="rotate(-6)"/>

            fill="#1B1D21" stroke="#3D4148" stroke-width="2" transform="rotate(2)"/>

      <g transform="rotate(-1)">
        <rect x="-260" y="-150" width="520" height="320" rx="28" ry="28"
              fill="#22252A" stroke="#4FA9B8" stroke-width="2"/>
        <rect x="-260" y="-150" width="520" height="48" rx="28" ry="28"
              fill="#1B1D21"/>
        <rect x="-260" y="-126" width="520" height="24" fill="#1B1D21"/>
        <!-- accent dot -->
        <circle cx="-220" cy="-126" r="6" fill="#E63946"/>
        <!-- title placeholder -->
        <rect x="-200" y="-30" width="280" height="14" rx="4" fill="#EEEAE2" opacity="0.85"/>
        <rect x="-200" y="-4" width="180" height="14" rx="4" fill="#EEEAE2" opacity="0.85"/>
        <!-- italic accent line -->
        <rect x="-200" y="40" width="220" height="10" rx="3" fill="#F26B73" opacity="0.9"/>
      </g>
    </g>
  </svg>
